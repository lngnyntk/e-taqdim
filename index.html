<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Taqdim | AR Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        .view-section { display: none; }
        .view-section.active { display: block; }
        model-viewer {
            width: 100%;
            height: 350px;
            --poster-color: transparent;
        }
        #ar-button {
            background-color: white;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            position: absolute;
            bottom: 16px;
            right: 16px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body class="bg-white text-gray-900 font-sans antialiased">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-5xl mx-auto px-6 h-20 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tighter cursor-pointer" onclick="showView('gallery')">E-TAQDIM</h1>
            <button id="btn-toggle" onclick="toggleView()" class="bg-black text-white px-5 py-2 rounded-full text-sm font-medium hover:bg-gray-800 transition">
                Tambah Model
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-6 py-12">
        
        <!-- View 1: Gallery -->
        <section id="view-gallery" class="view-section active">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12" id="gallery-container">
                <!-- Placeholder Card (Ini akan di-render dinamis nantinya) -->
                <div class="group">
                    <div class="relative bg-gray-50 rounded-3xl overflow-hidden border border-gray-100 shadow-sm transition-transform duration-500 hover:scale-[1.02]">
                        <model-viewer 
                            src="" 
                            ios-src="model/pernikahan/souvenir-1.usdz" 
                            ar ar-modes="quick-look" 
                            camera-controls 
                            touch-action="pan-y">
                            <button slot="ar-button" id="ar-button">Lihat AR</button>
                        </model-viewer>
                    </div>
                    <div class="mt-6 flex justify-between items-start">
                        <div>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-1">Pernikahan Budi</p>
                            <h2 class="text-xl font-medium">Souvenir Kristal</h2>
                        </div>
                        <span class="text-[10px] px-2 py-1 border border-gray-200 rounded text-gray-400 uppercase">Index 1</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- View 2: Form Tambah -->
        <section id="view-tambah" class="view-section max-w-md mx-auto">
            <div class="mb-10 text-center">
                <h2 class="text-3xl font-bold mb-2">Upload Model</h2>
                <p class="text-gray-500">File akan otomatis tersimpan di folder /model sesuai kategori.</p>
            </div>
            
            <form action="/upload" method="POST" enctype="multipart/form-data" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-gray-400">Nama Acara</label>
                    <input type="text" name="nama_acara" placeholder="misal: aqiqah-razan" required
                        class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-black outline-none">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-gray-400">Bentuk</label>
                    <input type="text" name="bentuk" placeholder="misal: dekorasi" required
                        class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-black outline-none">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-gray-400">File USDZ (iPhone)</label>
                    <div class="relative group">
                        <input type="file" name="model_file" accept=".usdz" required
                            class="w-full text-sm text-gray-400 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-black file:text-white hover:file:bg-gray-800 cursor:pointer bg-gray-50 rounded-2xl p-2">
                    </div>
                </div>

                <button type="submit" class="w-full bg-black text-white py-5 rounded-3xl font-bold text-lg hover:shadow-2xl hover:-translate-y-1 transition-all duration-300">
                    Simpan ke Galeri
                </button>
            </form>
        </section>

    </main>

    <script>
        function showView(viewName) {
            const gallery = document.getElementById('view-gallery');
            const tambah = document.getElementById('view-tambah');
            const btn = document.getElementById('btn-toggle');

            if (viewName === 'gallery') {
                gallery.classList.add('active');
                tambah.classList.remove('active');
                btn.innerText = 'Tambah Model';
            } else {
                tambah.classList.add('active');
                gallery.classList.remove('active');
                btn.innerText = 'Lihat Galeri';
            }
        }

        function toggleView() {
            const isGallery = document.getElementById('view-gallery').classList.contains('active');
            showView(isGallery ? 'tambah' : 'gallery');
        }
    </script>
</body>
</html>
